# Multi-instance Redis pub/sub integration test stack.
#
# Brings up postgres + redis + sqitch (one-shot deploy) + 2 backend instances.
# The Python test driver connects to backend1 and backend2 directly via their
# host-published ports (no nginx round-robin needed for the scenarios).
#
# Usage:
#   docker compose -f docker-compose.test.yml up -d --build
#   ./run.sh        # full orchestration including teardown

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: enclave_mi
      POSTGRES_PASSWORD: mi_password
      POSTGRES_DB: enclave_mi
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U enclave_mi"]
      interval: 2s
      timeout: 2s
      retries: 30

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "no", "--save", ""]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 30

  sqitch:
    image: sqitch/sqitch:latest
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SQITCH_TARGET: "db:pg://enclave_mi:mi_password@postgres:5432/enclave_mi"
    volumes:
      - ../../../sqitch:/repo:z
    working_dir: /repo
    command: ["deploy", "--verify"]

  backend1:
    build:
      context: ../../../backend
      dockerfile: Dockerfile
    environment:
      POSTGRES_USER: enclave_mi
      POSTGRES_PASSWORD: mi_password
      POSTGRES_DB: enclave_mi
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      BACKEND_PORT: 9001
      ENABLE_SQITCH_ONLY: "1"
      REDIS_URL: redis://redis:6379
      INSTANCE_ID: backend1
      UPLOAD_DIR: /data/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      sqitch:
        condition: service_completed_successfully
    ports:
      - "9101:9001"

  backend2:
    build:
      context: ../../../backend
      dockerfile: Dockerfile
    environment:
      POSTGRES_USER: enclave_mi
      POSTGRES_PASSWORD: mi_password
      POSTGRES_DB: enclave_mi
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      BACKEND_PORT: 9001
      ENABLE_SQITCH_ONLY: "1"
      REDIS_URL: redis://redis:6379
      INSTANCE_ID: backend2
      UPLOAD_DIR: /data/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      sqitch:
        condition: service_completed_successfully
    ports:
      - "9102:9001"
