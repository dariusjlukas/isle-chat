<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.ico" />
    <script>
      (function() {
        var colorTheme = localStorage.getItem('colorTheme') || 'modern';
        var setting = localStorage.getItem('mode') || localStorage.getItem('theme') || 'auto';
        var mode = setting === 'auto' ? (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light') : setting;
        document.documentElement.classList.add(colorTheme + '-' + mode, mode);
      })();
    </script>
    <title>EnclaveStation</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
