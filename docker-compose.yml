services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER must be set in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB must be set in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    mem_limit: 2g
    cpus: 2.0
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  sqitch:
    image: sqitch/sqitch:latest
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SQITCH_TARGET: db:pg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    volumes:
      - ./sqitch:/repo:z
    working_dir: /repo
    command: ["deploy", "--verify"]

  redis:
    image: redis:7-alpine
    profiles: ["redis"]
    command: ["redis-server", "--appendonly", "no", "--save", ""]
    mem_limit: 256m
    cpus: 0.5
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    networks:
      - default
      - llm
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER must be set in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB must be set in .env}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      BACKEND_PORT: 9001
      SESSION_EXPIRY_HOURS: ${SESSION_EXPIRY_HOURS:-168}
      PUBLIC_URL: ${PUBLIC_URL:-}
      UPLOAD_DIR: /data/uploads
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-0}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-10}
      # P2.1: optional Redis pub/sub for horizontal WS scaling.
      #   REDIS_URL=""              -> single-instance mode (default; no Redis).
      #   REDIS_URL=redis://redis:6379 -> cross-instance broadcast via Redis.
      # When enabled, run with `--profile redis` to bring the redis service up.
      # See docs/ops/redis-pubsub.md for the rollout playbook.
      REDIS_URL: ${REDIS_URL:-}
      INSTANCE_ID: ${INSTANCE_ID:-}
      # Sqitch rollout (P1.1):
      #   ENABLE_SQITCH_ONLY=0 (default): backend runs Database::init_schema() as before.
      #     Optional: with DEBUG_SCHEMA_DIFF=1 backend asserts the live schema matches
      #     what sqitch would deploy.
      #   ENABLE_SQITCH_ONLY=1: backend skips init_schema(); rely on the sqitch sidecar.
      ENABLE_SQITCH_ONLY: ${ENABLE_SQITCH_ONLY:-1}
      DEBUG_SCHEMA_DIFF: ${DEBUG_SCHEMA_DIFF:-0}
    volumes:
      - uploads:/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
      sqitch:
        condition: service_completed_successfully
    ports:
      - "9001:9001"
    mem_limit: 1g
    cpus: 2.0
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:9001/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:z
    ports:
      - "80:80"
    depends_on:
      - backend
    mem_limit: 128m
    cpus: 0.5

networks:
  llm:
    external: true
    name: llm-network

volumes:
  pgdata:
  uploads:
